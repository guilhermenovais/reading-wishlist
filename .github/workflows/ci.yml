name: CI e Cobertura de Testes

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    name: Testes no ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Aqui cumprimos o requisito de correr em Linux, Mac e Windows!
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Instalar dependências
      run: npm ci

    - name: Gerar o manual do Prisma
      run: npx prisma generate

    - name: Executar testes com cobertura (Coverage)
      run: npm run test:coverage

    - name: Upload para o Codecov
      # O envio para o Codecov só precisa ser feito uma vez (no Linux)
      if: matrix.os == 'ubuntu-latest'
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: true
