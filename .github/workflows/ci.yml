name: CI e Cobertura de Testes

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    name: Testes no ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Aqui cumprimos o requisito de correr em Linux, Mac e Windows!
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Instalar dependências
      run: npm install

    - name: Gerar o manual do Prisma
      run: npx prisma generate

    - name: Executar testes com cobertura (Coverage)
      run: npm run test:coverage

    - name: Upload para o Codecov
      if: matrix.os == 'ubuntu-latest'
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: true

  e2e:
    name: Testes E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: reading_wishlist
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U user -d reading_wishlist"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Instalar dependências
      run: npm install

    - name: Instalar navegadores do Playwright
      run: npx playwright install --with-deps chromium

    - name: Gerar o Prisma Client e aplicar migrações
      run: |
        npx prisma generate
        npx prisma db push
      env:
        DATABASE_URL: "postgresql://user:password@localhost:5432/reading_wishlist?schema=public"

    - name: Executar testes E2E
      run: npm run test:e2e
      env:
        DATABASE_URL: "postgresql://user:password@localhost:5432/reading_wishlist?schema=public"
        GOOGLE_BOOKS_API_KEY: ${{ secrets.GOOGLE_BOOKS_API_KEY }}

    - name: Upload do relatório Playwright
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
